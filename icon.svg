<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1814"/>
      <stop offset="100%" stop-color="#0f0e0c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Notebook lines -->
  <line x1="80" y1="168" x2="432" y2="168" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
  <line x1="80" y1="200" x2="432" y2="200" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
  <line x1="80" y1="232" x2="432" y2="232" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
  <line x1="80" y1="264" x2="432" y2="264" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
  <line x1="80" y1="296" x2="432" y2="296" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
  <line x1="80" y1="328" x2="432" y2="328" stroke="rgba(37,99,235,0.15)" stroke-width="2"/>
  <!-- Book shape -->
  <rect x="100" y="120" width="260" height="300" rx="8" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
  <!-- Left red bar -->
  <rect x="140" y="120" width="3" height="300" fill="#d85a30" opacity="0.8"/>
  <!-- M C I Letters -->
  <text x="176" y="310" font-family="Georgia, serif" font-size="140" font-weight="700" fill="#ffffff" opacity="0.95" letter-spacing="-8">MCI</text>
  <!-- Accent dot -->
  <circle cx="390" cy="390" r="48" fill="#d85a30"/>
  <text x="390" y="405" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="white" font-weight="700">✦</text>
</svg>